<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClawOps Mission Control</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>ClawOps Mission Control</h1>
      <p class="sub">Mission board + executive panel for Henry / ClawOps HQ</p>
    </div>
    <div class="actions">
      <button id="refreshBtn">Refresh</button>
      <a id="notionLink" target="_blank" rel="noreferrer">Open Notion HQ</a>
    </div>
  </header>

  <main>
    <section class="stats" id="stats"></section>

    <section class="panel-grid">
      <article class="panel">
        <h2>Next 3 Moves</h2>
        <ol id="nextMoves"></ol>
      </article>
      <article class="panel">
        <h2>System Snapshot</h2>
        <div id="systemSnapshot" class="compact-list"></div>
      </article>
      <article class="panel">
        <h2>Agent Routing</h2>
        <div id="agentBindings" class="compact-list"></div>
      </article>
      <article class="panel">
        <h2>Notion Assets</h2>
        <div id="notionAssets" class="compact-list"></div>
      </article>
    </section>

    <section class="board-wrap">
      <div class="board-header">
        <h2>Mission Board</h2>
        <p>Source of truth: local docs + TASKS.md + live OpenClaw config</p>
      </div>
      <div class="board" id="board"></div>
    </section>

    <section class="panel-grid lower">
      <article class="panel wide">
        <h2>Telegram Lanes</h2>
        <div id="lanes" class="tableish"></div>
      </article>
      <article class="panel wide">
        <h2>Integrations / Apps</h2>
        <div id="integrations" class="tableish"></div>
      </article>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
